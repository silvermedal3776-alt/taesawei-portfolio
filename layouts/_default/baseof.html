<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ if .IsHome }}{{ .Site.Title }}{{ else }}{{ .Title }} · {{ .Site.Title }}{{ end }}</title>
  <meta name="description" content="{{ if .Description }}{{ .Description }}{{ else }}{{ .Site.Params.description }}{{ end }}">
  <link rel="stylesheet" href="{{ "css/style.css" | relURL }}">
  <link rel="icon" href="data:,">
</head>
<body>
  <div class="layout">
    {{ partial "sidebar.html" . }}

    <div class="page">
      <main class="content-wrap">
        {{ block "main" . }}{{ end }}
      </main>

      <footer class="site-footer">
        <p>&copy; {{ now.Year }} {{ .Site.Params.author }}</p>
      </footer>
    </div>
  </div>

  <script>
    (function () {
      var toggle = document.querySelector('.sidebar-toggle');
      var sidebar = document.querySelector('.sidebar');
      if (toggle && sidebar) {
        toggle.addEventListener('click', function () {
          var open = sidebar.classList.toggle('is-open');
          toggle.setAttribute('aria-expanded', open ? 'true' : 'false');
        });
      }
      // On touch devices, tap to expand submenu instead of relying on hover
      document.querySelectorAll('.sidebar-item.has-children > .sidebar-link').forEach(function (link) {
        link.addEventListener('click', function (e) {
          if (window.matchMedia('(max-width: 880px)').matches) {
            var parent = link.parentElement;
            var alreadyOpen = parent.classList.contains('is-open');
            document.querySelectorAll('.sidebar-item.has-children.is-open').forEach(function (el) {
              el.classList.remove('is-open');
            });
            if (!alreadyOpen) {
              e.preventDefault();
              parent.classList.add('is-open');
            }
          }
        });
      });
    })();
  </script>
</body>
</html>
