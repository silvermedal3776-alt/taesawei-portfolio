{{ define "main" }}
<header class="list-header">
  <h1>{{ .Title }}</h1>
</header>

<div class="card-grid">
  {{ range .Pages.ByDate.Reverse }}
  <a class="card" href="{{ .RelPermalink }}">
    <h3>{{ .Title }}</h3>
    {{ if .Params.subjects }}
    <div class="tags">
      {{ range .Params.subjects }}<span class="tag">{{ . }}</span>{{ end }}
    </div>
    {{ end }}
    <p>{{ .Summary | plainify | truncate 120 }}</p>
    <span class="card-date">{{ .Date.Format "2006-01-02" }}</span>
  </a>
  {{ end }}
</div>
{{ end }}
